name: build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build app
        run: dotnet build .\KemTranslate.csproj -c Release

      - name: Run tests
        run: dotnet run --project .\KemTranslate.Tests\KemTranslate.Tests.csproj -c Release
